<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#a855f7"/>
      <stop offset="40%"  style="stop-color:#7c3aed"/>
      <stop offset="70%"  style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="860" height="200" fill="#0f0f1a" rx="14"/>

  <!-- LEFT CARD — GitHub Stats -->
  <rect x="12" y="12" width="420" height="176" rx="12" fill="#16162a" stroke="#a855f730" stroke-width="1"/>

  <!-- Title -->
  <text x="30" y="40" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#c084fc">GitHub Statistics</text>
  <line x1="30" y1="50" x2="416" y2="50" stroke="#a855f725" stroke-width="1"/>

  <!-- Stat rows -->
  <text x="30"  y="76"  font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#7c6b9e">Total de estrelas</text>
  <text x="410" y="76"  font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#a78bfa" font-weight="600" text-anchor="end">—</text>

  <text x="30"  y="102" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#7c6b9e">Total de Commits</text>
  <text x="410" y="102" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#a78bfa" font-weight="600" text-anchor="end">—</text>

  <text x="30"  y="128" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#7c6b9e">Total de PRs</text>
  <text x="410" y="128" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#a78bfa" font-weight="600" text-anchor="end">—</text>

  <text x="30"  y="154" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#7c6b9e">Total de Issues</text>
  <text x="410" y="154" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#a78bfa" font-weight="600" text-anchor="end">—</text>

  <text x="30"  y="178" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#7c6b9e">Repositorios publicos</text>
  <text x="410" y="178" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#a78bfa" font-weight="600" text-anchor="end">—</text>

  <!-- RIGHT CARD — Languages -->
  <rect x="444" y="12" width="404" height="176" rx="12" fill="#16162a" stroke="#7c3aed30" stroke-width="1"/>

  <!-- Title -->
  <text x="462" y="40" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#c084fc">Tecnologias</text>
  <line x1="462" y1="50" x2="832" y2="50" stroke="#a855f725" stroke-width="1"/>

  <!-- Color bar -->
  <rect x="462" y="62" width="366" height="8" rx="4" fill="#1e1e35"/>
  <rect x="462" y="62" width="165" height="8" rx="4" fill="#a855f7"/>
  <rect x="627" y="62" width="90"  height="8" rx="2" fill="#7c3aed"/>
  <rect x="717" y="62" width="65"  height="8" rx="2" fill="#4f46e5"/>
  <rect x="782" y="62" width="46"  height="8" rx="4" fill="#6d28d9"/>

  <!-- Lang legend col 1 -->
  <circle cx="470" cy="92"  r="5" fill="#a855f7"/>
  <text x="482" y="96"  font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#9d7fc9">Java</text>

  <circle cx="470" cy="116" r="5" fill="#7c3aed"/>
  <text x="482" y="120" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#9d7fc9">Python</text>

  <circle cx="470" cy="140" r="5" fill="#4f46e5"/>
  <text x="482" y="144" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#9d7fc9">HTML</text>

  <circle cx="470" cy="164" r="5" fill="#6d28d9"/>
  <text x="482" y="168" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#9d7fc9">CSS</text>

  <!-- Lang legend col 2 -->
  <circle cx="630" cy="92"  r="5" fill="#8b5cf6"/>
  <text x="642" y="96"  font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#9d7fc9">JavaScript</text>

  <circle cx="630" cy="116" r="5" fill="#9333ea"/>
  <text x="642" y="120" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#9d7fc9">SQL / PLSQL</text>

  <circle cx="630" cy="140" r="5" fill="#6366f1"/>
  <text x="642" y="144" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#9d7fc9">TypeScript</text>

  <circle cx="630" cy="164" r="5" fill="#3b0764"/>
  <text x="642" y="168" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#9d7fc9">Other</text>
</svg>
