<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');

      .bg { fill: #0d0010; }
      .grid-line { stroke: #ff2d7833; stroke-width: 0.5; }

      /* Name glitch */
      .name {
        font-family: 'Share Tech Mono', monospace;
        font-size: 58px;
        font-weight: bold;
        fill: #ff2d78;
        filter: url(#glow);
      }
      .name-glitch1 {
        font-family: 'Share Tech Mono', monospace;
        font-size: 58px;
        font-weight: bold;
        fill: #00f5ff;
        opacity: 0;
        animation: glitch1 4s infinite;
      }
      .name-glitch2 {
        font-family: 'Share Tech Mono', monospace;
        font-size: 58px;
        font-weight: bold;
        fill: #ff2d78;
        opacity: 0;
        animation: glitch2 4s infinite;
      }

      .subtitle {
        font-family: 'Share Tech Mono', monospace;
        font-size: 18px;
        fill: #cc80ff;
        animation: fadeInUp 1.5s ease forwards;
        opacity: 0;
      }
      .tagline {
        font-family: 'Share Tech Mono', monospace;
        font-size: 13px;
        fill: #ff2d7899;
        animation: fadeInUp 2s ease forwards;
        opacity: 0;
      }

      /* Scanline */
      .scanline {
        fill: none;
        stroke: #ff2d7815;
        stroke-width: 2;
        animation: scan 3s linear infinite;
      }

      /* Particles */
      .p1 { fill: #ff2d78; animation: float1 6s ease-in-out infinite; }
      .p2 { fill: #00f5ff; animation: float2 5s ease-in-out infinite; }
      .p3 { fill: #cc80ff; animation: float3 7s ease-in-out infinite; }
      .p4 { fill: #ff2d78; animation: float1 4s ease-in-out infinite reverse; }
      .p5 { fill: #00f5ff; animation: float2 8s ease-in-out infinite reverse; }
      .p6 { fill: #cc80ff; animation: float3 5.5s ease-in-out infinite; }

      /* Border pulse */
      .border-top {
        stroke: #ff2d78;
        stroke-width: 2;
        fill: none;
        animation: borderPulse 2s ease-in-out infinite alternate;
      }
      .border-bottom {
        stroke: #00f5ff;
        stroke-width: 2;
        fill: none;
        animation: borderPulse 2s ease-in-out infinite alternate-reverse;
      }

      .corner { fill: none; stroke: #ff2d78; stroke-width: 2; }

      /* Code rain chars */
      .rain {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #ff2d7840;
      }
      .rain1 { animation: rainFall 4s linear infinite; }
      .rain2 { animation: rainFall 3s linear infinite 1s; }
      .rain3 { animation: rainFall 5s linear infinite 0.5s; }
      .rain4 { animation: rainFall 3.5s linear infinite 2s; }
      .rain5 { animation: rainFall 4.5s linear infinite 1.5s; }

      @keyframes glitch1 {
        0%,89%,100% { opacity:0; transform: translate(0,0); }
        90% { opacity:0.8; transform: translate(-4px, 1px); }
        92% { opacity:0; }
        94% { opacity:0.6; transform: translate(4px, -1px); }
        96% { opacity:0; }
      }
      @keyframes glitch2 {
        0%,91%,100% { opacity:0; transform: translate(0,0); }
        92% { opacity:0.5; transform: translate(3px, 2px); clip-path: inset(30% 0 50% 0); }
        94% { opacity:0; }
        96% { opacity:0.4; transform: translate(-3px, -2px); }
        98% { opacity:0; }
      }
      @keyframes fadeInUp {
        from { opacity:0; transform: translateY(12px); }
        to   { opacity:1; transform: translateY(0); }
      }
      @keyframes scan {
        0%   { transform: translateY(0); opacity:0; }
        10%  { opacity:1; }
        90%  { opacity:1; }
        100% { transform: translateY(280px); opacity:0; }
      }
      @keyframes float1 {
        0%,100% { transform: translateY(0) translateX(0); opacity:0.9; }
        50%     { transform: translateY(-18px) translateX(6px); opacity:0.4; }
      }
      @keyframes float2 {
        0%,100% { transform: translateY(0) translateX(0); opacity:0.7; }
        50%     { transform: translateY(14px) translateX(-8px); opacity:0.3; }
      }
      @keyframes float3 {
        0%,100% { transform: translateY(0) translateX(0); opacity:0.8; }
        33%     { transform: translateY(-10px) translateX(10px); opacity:0.5; }
        66%     { transform: translateY(8px) translateX(-5px); opacity:0.6; }
      }
      @keyframes borderPulse {
        from { stroke-opacity: 0.4; }
        to   { stroke-opacity: 1; filter: drop-shadow(0 0 6px #ff2d78); }
      }
      @keyframes rainFall {
        0%   { transform: translateY(-40px); opacity:0; }
        10%  { opacity:1; }
        90%  { opacity:0.5; }
        100% { transform: translateY(320px); opacity:0; }
      }
      @keyframes blink {
        0%,49%,100% { opacity:1; }
        50%,99%     { opacity:0; }
      }
      .cursor {
        fill: #ff2d78;
        animation: blink 1s step-end infinite;
      }
    </style>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect class="bg" width="900" height="280"/>

  <!-- Grid -->
  <line class="grid-line" x1="0" y1="40"  x2="900" y2="40"/>
  <line class="grid-line" x1="0" y1="80"  x2="900" y2="80"/>
  <line class="grid-line" x1="0" y1="120" x2="900" y2="120"/>
  <line class="grid-line" x1="0" y1="160" x2="900" y2="160"/>
  <line class="grid-line" x1="0" y1="200" x2="900" y2="200"/>
  <line class="grid-line" x1="0" y1="240" x2="900" y2="240"/>
  <line class="grid-line" x1="80"  y1="0" x2="80"  y2="280"/>
  <line class="grid-line" x1="180" y1="0" x2="180" y2="280"/>
  <line class="grid-line" x1="280" y1="0" x2="280" y2="280"/>
  <line class="grid-line" x1="380" y1="0" x2="380" y2="280"/>
  <line class="grid-line" x1="480" y1="0" x2="480" y2="280"/>
  <line class="grid-line" x1="580" y1="0" x2="580" y2="280"/>
  <line class="grid-line" x1="680" y1="0" x2="680" y2="280"/>
  <line class="grid-line" x1="780" y1="0" x2="780" y2="280"/>

  <!-- Code rain -->
  <text class="rain rain1" x="22"  y="0">01</text>
  <text class="rain rain2" x="820" y="0">10</text>
  <text class="rain rain3" x="50"  y="0">11</text>
  <text class="rain rain4" x="860" y="0">00</text>
  <text class="rain rain5" x="38"  y="0">01</text>
  <text class="rain rain1" x="845" y="0" style="animation-delay:2s">10</text>
  <text class="rain rain3" x="10"  y="0" style="animation-delay:3s">11</text>

  <!-- Floating particles -->
  <circle class="p1" cx="60"  cy="220" r="3"/>
  <circle class="p2" cx="830" cy="60"  r="2"/>
  <circle class="p3" cx="120" cy="50"  r="2.5"/>
  <circle class="p4" cx="760" cy="200" r="3"/>
  <circle class="p5" cx="200" cy="230" r="2"/>
  <circle class="p6" cx="700" cy="40"  r="2.5"/>
  <circle class="p1" cx="450" cy="255" r="2" style="animation-delay:1s"/>
  <circle class="p2" cx="500" cy="25"  r="1.5" style="animation-delay:2s"/>
  <circle class="p3" cx="350" cy="245" r="2" style="animation-delay:3s"/>

  <!-- Corner decorations -->
  <polyline class="corner" points="20,10 10,10 10,30"/>
  <polyline class="corner" points="880,10 890,10 890,30"/>
  <polyline class="corner" points="20,270 10,270 10,250"/>
  <polyline class="corner" points="880,270 890,270 890,250"/>

  <!-- Scanline sweep -->
  <line class="scanline" x1="0" y1="0" x2="900" y2="0"/>

  <!-- Name — main + glitch layers -->
  <text class="name"        x="450" y="140" text-anchor="middle">Rebeca Ayres</text>
  <text class="name-glitch1" x="450" y="140" text-anchor="middle">Rebeca Ayres</text>
  <text class="name-glitch2" x="450" y="140" text-anchor="middle">Rebeca Ayres</text>

  <!-- Subtitle -->
  <text class="subtitle" x="450" y="178" text-anchor="middle" style="animation-delay:0.8s">
    Full-Stack Developer · Java · Spring Boot · Python
  </text>

  <!-- Tagline -->
  <text class="tagline" x="450" y="210" text-anchor="middle" style="animation-delay:1.4s">
    &lt; building things that actually work /&gt;
  </text>

  <!-- Blinking cursor -->
  <rect class="cursor" x="636" y="196" width="9" height="16" rx="1"/>

  <!-- Borders -->
  <line class="border-top"    x1="30" y1="4"   x2="870" y2="4"/>
  <line class="border-bottom" x1="30" y1="276" x2="870" y2="276"/>

  <!-- Side accent lines -->
  <line x1="6" y1="40" x2="6" y2="240" stroke="#ff2d78" stroke-width="2" opacity="0.5"/>
  <line x1="894" y1="40" x2="894" y2="240" stroke="#00f5ff" stroke-width="2" opacity="0.5" filter="url(#glowCyan)"/>
</svg>
