<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260">
  <defs>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="55%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#a855f7;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#7c3aed;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e35"/>
      <stop offset="100%" style="stop-color:#13131f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .status-dot { fill: #22c55e; animation: blink 2s ease-in-out infinite; }
      .dot  { fill: #a855f7; animation: pulse 2s ease-in-out infinite; }
      .dot2 { fill: #7c3aed; animation: pulse 2s ease-in-out infinite 0.5s; }
      .dashed { stroke: #a855f740; stroke-width:1; stroke-dasharray:4 4; animation: dash 2s linear infinite; }
      @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0.3} }
      @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:0.4} }
      @keyframes dash   { to{stroke-dashoffset:-20} }
    </style>
  </defs>

  <!-- BG -->
  <rect width="900" height="260" fill="#0f0f1a" rx="16"/>
  <!-- Glow blobs -->
  <ellipse cx="200" cy="110" rx="220" ry="130" fill="#a855f7" opacity="0.04"/>
  <ellipse cx="730" cy="140" rx="180" ry="110" fill="#7c3aed" opacity="0.05"/>
  <!-- Main card -->
  <rect x="28" y="22" width="844" height="216" fill="url(#cardGrad)" rx="14" opacity="0.65"/>
  <!-- Top border -->
  <rect x="28" y="22" width="844" height="2" fill="url(#accentLine)" rx="1"/>

  <!-- Corner brackets -->
  <polyline points="50,42 36,42 36,56"   fill="none" stroke="#a855f750" stroke-width="1.5"/>
  <polyline points="850,42 864,42 864,56" fill="none" stroke="#a855f750" stroke-width="1.5"/>
  <polyline points="50,218 36,218 36,204"  fill="none" stroke="#a855f750" stroke-width="1.5"/>
  <polyline points="850,218 864,218 864,204" fill="none" stroke="#a855f750" stroke-width="1.5"/>

  <!-- Status -->
  <circle class="status-dot" cx="58" cy="50" r="4" filter="url(#glow)"/>
  <text x="70" y="55" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#22c55e" letter-spacing="1">AVAILABLE FOR WORK</text>
  <text x="856" y="55" font-family="'Courier New',monospace" font-size="11" fill="#a855f760" text-anchor="end">v2025.1.0</text>

  <!-- Name -->
  <text x="58" y="138" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="54" font-weight="800" letter-spacing="-1" fill="url(#nameGrad)">Rebeca Ayres</text>

  <!-- Divider -->
  <line x1="58" y1="152" x2="570" y2="152" stroke="url(#accentLine)" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="60" y="174" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#8b8ba8" letter-spacing="2.5">FULL-STACK DEVELOPER</text>

  <!-- Tech tags -->
  <rect x="58"  y="186" width="50"  height="20" rx="6" fill="#a855f715"/>
  <rect x="116" y="186" width="66"  height="20" rx="6" fill="#a855f715"/>
  <rect x="190" y="186" width="54"  height="20" rx="6" fill="#a855f715"/>
  <rect x="252" y="186" width="52"  height="20" rx="6" fill="#7c3aed15"/>
  <rect x="312" y="186" width="56"  height="20" rx="6" fill="#7c3aed15"/>

  <text x="68"  y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#a855f7">Java</text>
  <text x="126" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#a855f7">Spring</text>
  <text x="200" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#a855f7">Python</text>
  <text x="262" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#9b6dff">Docker</text>
  <text x="322" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#9b6dff">Oracle</text>

  <!-- Right mini cards -->
  <rect x="656" y="56" width="182" height="64" rx="10" fill="#1a1a2e" stroke="#a855f730" stroke-width="1"/>
  <text x="674" y="78" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#8b8ba8" letter-spacing="1.5">PROJECTS</text>
  <text x="674" y="106" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#ffffff">10+</text>
  <circle class="dot" cx="822" cy="72" r="5" filter="url(#glow)"/>

  <line class="dashed" x1="747" y1="120" x2="747" y2="134" fill="none"/>

  <rect x="656" y="136" width="182" height="64" rx="10" fill="#1a1a2e" stroke="#7c3aed30" stroke-width="1"/>
  <text x="674" y="158" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#8b8ba8" letter-spacing="1.5">TECHNOLOGIES</text>
  <text x="674" y="186" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#ffffff">5+</text>
  <circle class="dot2" cx="822" cy="152" r="5" filter="url(#glow)"/>

  <!-- Bottom border -->
  <rect x="28" y="236" width="844" height="1" fill="url(#accentLine)" rx="1" opacity="0.4"/>
</svg>
