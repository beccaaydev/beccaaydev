<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Gradiente do nome -->
    <linearGradient id="ng" gradientUnits="userSpaceOnUse" x1="44" y1="0" x2="430" y2="0">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="35%"  stop-color="#ddd6fe"/>
      <stop offset="70%"  stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Linha do topo -->
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#8b5cf6" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#c084fc" stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#8b5cf6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>

    <!-- Divisor vertical -->
    <linearGradient id="vg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="80%"  stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>

    <!-- Acento dos stat boxes -->
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c084fc" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#c084fc" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>

    <!-- Scan line -->
    <linearGradient id="scg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="45%"  stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#c084fc" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>

    <!-- Padrão de pontos -->
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#8b5cf6" fill-opacity="0.22"/>
    </pattern>

  </defs>

  <style>
    /* ── SCAN LINE ── */
    .scan {
      animation: scan 7s linear infinite;
    }
    @keyframes scan {
      0%   { transform: translateY(0);     opacity: 0; }
      4%   { opacity: 1; }
      96%  { opacity: 1; }
      100% { transform: translateY(282px); opacity: 0; }
    }

    /* ── BRILHO AMBIENTE ── */
    .glow {
      animation: breathe 5s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    /* ── LINHA DO TOPO ── */
    .top-line {
      animation: topShimmer 4s ease-in-out infinite;
    }
    @keyframes topShimmer {
      0%, 100% { opacity: 0.75; }
      50%      { opacity: 1; }
    }

    /* ── CANTONEIRAS ── */
    .corners {
      animation: cornerPulse 6s ease-in-out infinite;
    }
    @keyframes cornerPulse {
      0%, 100% { opacity: 0.65; }
      50%      { opacity: 0.2; }
    }

    /* ── DOT "AVAILABLE" ── */
    .dot-fill {
      animation: dotFill 2.2s ease-in-out infinite;
    }
    @keyframes dotFill {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* ── NOME (fade in) ── */
    .name-g {
      animation: fadeIn 0.9s ease 0.1s both;
    }

    /* ── TÍTULO ── */
    .title-t {
      animation: fadeIn 0.9s ease 0.4s both;
    }

    /* ── PILLS (cascata) ── */
    .pg { animation: pillIn 0.5s ease both; }
    .p1 { animation-delay: 0.5s; }
    .p2 { animation-delay: 0.7s; }
    .p3 { animation-delay: 0.9s; }
    .p4 { animation-delay: 1.1s; }
    .p5 { animation-delay: 1.3s; }
    .p6 { animation-delay: 1.5s; }
    @keyframes pillIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── STATS (slide de cima) ── */
    .sn { animation: statIn 0.7s ease both; }
    .s1 { animation-delay: 0.7s; }
    .s2 { animation-delay: 1.0s; }
    @keyframes statIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FADE GENÉRICO ── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>

  <!-- ── FUNDO ── -->
  <rect width="900" height="280" fill="#07071a"/>
  <rect width="900" height="280" fill="url(#dots)"/>

  <!-- Brilho ambiente (respira) -->
  <ellipse class="glow" cx="840" cy="-50" rx="280" ry="210" fill="#8b5cf6" fill-opacity="0.09"/>

  <!-- Borda -->
  <rect width="900" height="280" fill="none" stroke="#8b5cf6" stroke-opacity="0.22" stroke-width="1"/>

  <!-- Linha acento topo (shimmer) -->
  <rect class="top-line" x="0" y="0" width="900" height="1.5" fill="url(#tg)"/>

  <!-- Scan line (desce em loop) -->
  <rect class="scan" x="0" y="0" width="900" height="1.5" fill="url(#scg)"/>

  <!-- ── CANTONEIRAS ── -->
  <g class="corners">
    <path d="M12 27 L12 12 L27 12"    fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="square"/>
    <path d="M873 12 L888 12 L888 27"  fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="square"/>
    <path d="M12 253 L12 268 L27 268"  fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="square"/>
    <path d="M873 268 L888 268 L888 253" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="square"/>
  </g>

  <!-- ── INDICADOR "AVAILABLE" ── -->
  <!-- Anel radar (SMIL — mais compatível para animar 'r') -->
  <circle cx="44" cy="52" r="3.5" fill="none" stroke="#34d399" stroke-opacity="0.6">
    <animate attributeName="r"              values="3.5;15"  dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.6;0"   dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <!-- Dot preenchido (pisca via CSS) -->
  <circle class="dot-fill" cx="44" cy="52" r="3.5" fill="#34d399"/>
  <text x="57" y="57"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="10" font-weight="500" fill="#34d399" letter-spacing="3.5">AVAILABLE FOR WORK</text>

  <!-- ── NOME ── -->
  <g class="name-g">
    <text x="44" y="117"
      font-family="'Segoe UI','Helvetica Neue','Arial Black',Arial,sans-serif"
      font-size="46" font-weight="900" fill="url(#ng)" letter-spacing="-0.5">Rebeca Ayres</text>
  </g>

  <!-- ── CARGO ── -->
  <text class="title-t" x="44" y="143"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="10.5" font-weight="300" fill="#c084fc" fill-opacity="0.6" letter-spacing="5">SOFTWARE DEVELOPER</text>

  <!-- ── PILLS (cada uma aparece em cascata) ── -->
  <g class="pg p1">
    <rect x="44" y="163" width="52" height="23" rx="11.5"
      fill="#8b5cf6" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.32" stroke-width="1"/>
    <text x="70" y="179" text-anchor="middle"
      font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="500"
      fill="#ddc4ff" fill-opacity="0.88">Java</text>
  </g>
  <g class="pg p2">
    <rect x="103" y="163" width="60" height="23" rx="11.5"
      fill="#8b5cf6" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.32" stroke-width="1"/>
    <text x="133" y="179" text-anchor="middle"
      font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="500"
      fill="#ddc4ff" fill-opacity="0.88">Spring</text>
  </g>
  <g class="pg p3">
    <rect x="170" y="163" width="62" height="23" rx="11.5"
      fill="#8b5cf6" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.32" stroke-width="1"/>
    <text x="201" y="179" text-anchor="middle"
      font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="500"
      fill="#ddc4ff" fill-opacity="0.88">Python</text>
  </g>
  <g class="pg p4">
    <rect x="239" y="163" width="62" height="23" rx="11.5"
      fill="#8b5cf6" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.32" stroke-width="1"/>
    <text x="270" y="179" text-anchor="middle"
      font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="500"
      fill="#ddc4ff" fill-opacity="0.88">Docker</text>
  </g>
  <g class="pg p5">
    <rect x="308" y="163" width="62" height="23" rx="11.5"
      fill="#8b5cf6" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.32" stroke-width="1"/>
    <text x="339" y="179" text-anchor="middle"
      font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="500"
      fill="#ddc4ff" fill-opacity="0.88">Oracle</text>
  </g>
  <g class="pg p6">
    <rect x="377" y="163" width="46" height="23" rx="11.5"
      fill="#8b5cf6" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.32" stroke-width="1"/>
    <text x="400" y="179" text-anchor="middle"
      font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="500"
      fill="#ddc4ff" fill-opacity="0.88">SQL</text>
  </g>

  <!-- ── DIVISOR VERTICAL ── -->
  <rect x="710" y="55" width="1" height="170" fill="url(#vg)"/>

  <!-- ── STAT BOX 1: REPOSITÓRIOS ── -->
  <rect x="726" y="60" width="148" height="74"
    fill="#8b5cf6" fill-opacity="0.06" stroke="#8b5cf6" stroke-opacity="0.28" stroke-width="1"/>
  <rect x="755" y="60" width="90" height="1" fill="url(#sg)"/>
  <!--
    ╔══════════════════════════════════════╗
    ║  ATUALIZE ESTE NÚMERO com seus repos ║
    ╚══════════════════════════════════════╝
  -->
  <text class="sn s1" x="800" y="106" text-anchor="middle"
    font-family="'Courier New','Segoe UI',monospace"
    font-size="30" font-weight="700" fill="#c084fc" letter-spacing="-1">5</text>
  <text x="800" y="123" text-anchor="middle"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="8.5" font-weight="400" fill="#c084fc" fill-opacity="0.38" letter-spacing="2.5">REPOSITÓRIOS</text>

  <!-- ── STAT BOX 2: TECNOLOGIAS ── -->
  <rect x="726" y="146" width="148" height="74"
    fill="#8b5cf6" fill-opacity="0.06" stroke="#8b5cf6" stroke-opacity="0.28" stroke-width="1"/>
  <rect x="755" y="146" width="90" height="1" fill="url(#sg)"/>
  <text class="sn s2" x="800" y="192" text-anchor="middle"
    font-family="'Courier New','Segoe UI',monospace"
    font-size="30" font-weight="700" fill="#c084fc" letter-spacing="-1">6</text>
  <text x="800" y="209" text-anchor="middle"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="8.5" font-weight="400" fill="#c084fc" fill-opacity="0.38" letter-spacing="2.5">TECNOLOGIAS</text>

</svg>
